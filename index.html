<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Land & Patta Assistant</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
            --bot-msg: #e8f4fd;
            --user-msg: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 { margin: 0; font-size: 1.2rem; }
        .chat-header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-msg);
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .option-btn {
            background: white;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .info-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .info-card h4 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .info-card ul { padding-left: 20px; margin: 10px 0; }
        .info-card li { margin-bottom: 5px; font-size: 0.9rem; }
        
        .timeline-badge {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button#send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>Land & Patta Assistant</h2>
        <p>Your guide to Indian Land Records & Services</p>
    </div>
    <div id="chat-window">
        <!-- Messages will appear here -->
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about Patta transfer, sub-division...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Database of services
    const services = {
        "transfer": {
            title: "Patta Transfer (Mutation)",
            description: "Used when ownership changes due to sale, gift, or inheritance.",
            timeline: "15 - 30 Working Days",
            checklist: [
                "Registered Sale Deed (Original/Copy)",
                "Identity Proof (Aadhaar, Voter ID)",
                "Latest Property Tax Receipt",
                "Encumbrance Certificate (EC)",
                "NOC from Housing Society (if applicable)"
            ],
            steps: [
                "Apply online via state e-Services portal",
                "Field Inspection by Village Administrative Officer (VAO)",
                "Review by Revenue Inspector (RI)",
                "Final approval and digital signature by Tahsildar"
            ]
        },
        "subdivision": {
            title: "Patta Sub-division",
            description: "Used when a large land parcel is divided into smaller plots.",
            timeline: "30 - 45 Working Days",
            checklist: [
                "Original Title Deed",
                "FMB Sketch (Field Measurement Book)",
                "Boundary Measurement Details",
                "Recent Land Tax Receipt",
                "ID and Address Proof"
            ],
            steps: [
                "Submit application at Taluk Office or Online",
                "Payment of Subdivision Charges (Challan)",
                "Measurement by Government Mandal Surveyor",
                "Updating of records in the A-Register"
            ]
        },
        "verification": {
            title: "Document Verification",
            description: "Essential checklist before buying any land.",
            timeline: "Immediate (Self-Check)",
            checklist: [
                "Mother Deed (Parent Documents for 30 years)",
                "Encumbrance Certificate (EC for 30 years)",
                "Layout Approval (DTCP/CMDA/RERA)",
                "Patta/Chitta Extract in seller's name",
                "Land Conversion Certificate (Agricultural to Non-Agri)"
            ],
            steps: [
                "Verify the Patta online using the Survey Number",
                "Check for active legal disputes in court records",
                "Compare physical boundaries with the FMB Sketch",
                "Verify the seller's identity and original documents"
            ]
        }
    };

    function addMessage(text, sender, isOptions = false, data = null) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        
        if (data) {
            msgDiv.innerHTML = `
                <div class="info-card">
                    <span class="timeline-badge">⏱ ${data.timeline}</span>
                    <h4>${data.title}</h4>
                    <p><em>${data.description}</em></p>
                    <strong>Checklist:</strong>
                    <ul>${data.checklist.map(item => `<li>${item}</li>`).join('')}</ul>
                    <strong>Steps:</strong>
                    <ol>${data.steps.map(step => `<li>${step}</li>`).join('')}</ol>
                </div>
            `;
        } else {
            msgDiv.innerText = text;
        }

        chatWindow.appendChild(msgDiv);

        if (isOptions) {
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options-container';
            const buttons = [
                { label: 'Patta Transfer', key: 'transfer' },
                { label: 'Sub-division', key: 'subdivision' },
                { label: 'Document Checklist', key: 'verification' }
            ];
            
            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = btn.label;
                b.onclick = () => handleServiceSelection(btn.key, btn.label);
                optionsDiv.appendChild(b);
            });
            chatWindow.appendChild(optionsDiv);
        }

        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleServiceSelection(key, label) {
        addMessage(label, 'user');
        setTimeout(() => {
            addMessage(`Here are the details for ${label}:`, 'bot', false, services[key]);
            setTimeout(() => {
                addMessage("Do you need help with anything else?", 'bot', true);
            }, 1000);
        }, 500);
    }

    function processInput() {
        const text = userInput.value.trim().toLowerCase();
        if (!text) return;

        addMessage(userInput.value, 'user');
        userInput.value = '';

        setTimeout(() => {
            if (text.includes("transfer") || text.includes("name change")) {
                handleServiceSelection('transfer', "Patta Transfer");
            } else if (text.includes("divide") || text.includes("subdivision") || text.includes("split")) {
                handleServiceSelection('subdivision', "Patta Sub-division");
            } else if (text.includes("check") || text.includes("verify") || text.includes("document")) {
                handleServiceSelection('verification', "Document Verification");
            } else {
                addMessage("I'm not sure about that. Please select one of the following services:", 'bot', true);
            }
        }, 800);
    }

    // Initial greeting
    window.onload = () => {
        addMessage("Hello! I am your Land & Patta Assistant. How can I help you today?", 'bot', true);
    };

    sendBtn.onclick = processInput;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') processInput(); };
</script>

</body>
  </html>
